services:
  db:
    image: postgres:16

    container_name: proxy_chat_db_dev

    env_file:
      - .env

    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

    ports:
      - "5433:5432"

    restart: unless-stopped


  migrate:
    build:
      context: ../..
      dockerfile: Dockerfile

    env_file:
      - .env

    depends_on:
      - db

    command: alembic upgrade head

  api:
    build:
      context: ../..
      dockerfile: Dockerfile

    container_name: proxy_chat_api_dev

    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"

    depends_on:
      migrate:
        condition: service_completed_successfully

    ports:
      - "8100:8000"

    command: python3 -m uvicorn api.main:app --host 0.0.0.0 --port 8000

    restart: unless-stopped

  bot:
    build:
      context: ../..
      dockerfile: Dockerfile

    container_name: proxy_chat_bot_dev

    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"

    extra_hosts:
      - "host.docker.internal:host-gateway"

    depends_on:
      migrate:
        condition: service_completed_successfully

    restart: unless-stopped


volumes:
  postgres_dev_data: