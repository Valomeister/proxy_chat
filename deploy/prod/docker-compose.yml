services:
  db:
    image: postgres:16

    container_name: proxy_chat_db_prod

    env_file:
      - .env

    ports:
      - "5437:5432"

    volumes:
      - postgres_prod_data:/var/lib/postgresql/data

    restart: unless-stopped


  migrate:
    build:
      context: ../..
      dockerfile: Dockerfile

    env_file:
      - .env

    depends_on:
      - db

    command: alembic upgrade head


  api:
    build:
      context: ../..
      dockerfile: Dockerfile

    container_name: proxy_chat_api_prod

    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"

    depends_on:
      migrate:
        condition: service_completed_successfully

    ports:
      - "8001:8000"

    command: python3 -m uvicorn api.main:app --host 0.0.0.0 --port 8000

    restart: unless-stopped

  bot:
    build:
      context: ../..
      dockerfile: Dockerfile

    container_name: proxy_chat_bot_prod

    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"


    extra_hosts:
      - "host.docker.internal:host-gateway"

    depends_on:
      migrate:
        condition: service_completed_successfully

    restart: unless-stopped




volumes:
  postgres_prod_data: